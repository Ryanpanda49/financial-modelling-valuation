name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Compile Python sources
        run: python -m compileall -q src tests scripts
      - name: Lint Python sources
        run: ruff check src tests scripts
      - name: Type-check package
        run: mypy --python-version "${{ matrix.python-version }}" src/fmva
      - name: Run tests
        run: pytest
      - name: Audit public release candidates
        run: python scripts/public_release_check.py
      - name: Run pinned WMT workflow offline
        run: >-
          python -m fmva.run
          --history-json data/sample/wmt_fy2022_2026_history.json
          --forecast-assumptions examples/wmt/forecast_assumptions.yaml
          --valuation-assumptions examples/wmt/valuation_assumptions.yaml
          --output "${{ runner.temp }}/wmt"
      - name: Run pinned AAPL workflow offline
        run: >-
          python -m fmva.run
          --history-json data/sample/aapl_fy2021_2025_history.json
          --forecast-assumptions examples/aapl/forecast_assumptions.yaml
          --valuation-assumptions examples/aapl/valuation_assumptions.yaml
          --output "${{ runner.temp }}/aapl"
      - name: Run pinned COST workflow offline
        run: >-
          python -m fmva.run
          --history-json data/sample/cost_fy2021_2025_history.json
          --forecast-assumptions examples/cost/forecast_assumptions.yaml
          --valuation-assumptions examples/cost/valuation_assumptions.yaml
          --output "${{ runner.temp }}/cost"
      - name: Run COST bottom-up business-driver workflow offline
        run: >-
          python -m fmva.run
          --history-json data/sample/cost_fy2021_2025_history.json
          --forecast-assumptions examples/cost/forecast_assumptions.yaml
          --valuation-assumptions examples/cost/valuation_assumptions.yaml
          --business-drivers examples/cost/business_drivers.yaml
          --output "${{ runner.temp }}/cost-bottom-up"
      - name: Run pinned KO workflow offline
        run: >-
          python -m fmva.run
          --history-json data/sample/ko_fy2021_2025_history.json
          --forecast-assumptions examples/ko/forecast_assumptions.yaml
          --valuation-assumptions examples/ko/valuation_assumptions.yaml
          --output "${{ runner.temp }}/ko"
      - name: Run pinned MSFT workflow offline
        run: >-
          python -m fmva.run
          --history-json data/sample/msft_fy2021_2025_history.json
          --forecast-assumptions examples/msft/forecast_assumptions.yaml
          --valuation-assumptions examples/msft/valuation_assumptions.yaml
          --output "${{ runner.temp }}/msft"
      - name: Run MSFT sourced segment workflow offline
        run: >-
          python -m fmva.run
          --history-json data/sample/msft_fy2021_2025_history.json
          --forecast-assumptions examples/msft/forecast_assumptions.yaml
          --valuation-assumptions examples/msft/valuation_assumptions.yaml
          --business-drivers examples/msft/business_drivers.yaml
          --business-kpi-history data/sample/msft_business_kpis_fy2023_2025.csv
          --output "${{ runner.temp }}/msft-segment"
      - name: Rank MSFT business model candidates offline
        run: >-
          python -m fmva.cli recommend-business-model
          --history-json data/sample/msft_fy2021_2025_history.json
          --business-kpi-history data/sample/msft_business_kpis_fy2023_2025.csv
          --output "${{ runner.temp }}/msft-model-candidates.csv"
      - name: Generate researcher-reviewable MSFT segment draft
        run: >-
          python -m fmva.cli draft-business-model
          --history-json data/sample/msft_fy2021_2025_history.json
          --business-kpi-history data/sample/msft_business_kpis_fy2023_2025.csv
          --model-type segment_revenue
          --forecast-years 2026 2027 2028 2029 2030
          --output "${{ runner.temp }}/msft-segment-draft.yaml"
      - name: Run generated MSFT segment draft through valuation
        run: >-
          python -m fmva.run
          --history-json data/sample/msft_fy2021_2025_history.json
          --forecast-assumptions examples/msft/forecast_assumptions.yaml
          --valuation-assumptions examples/msft/valuation_assumptions.yaml
          --business-drivers "${{ runner.temp }}/msft-segment-draft.yaml"
          --business-kpi-history data/sample/msft_business_kpis_fy2023_2025.csv
          --output "${{ runner.temp }}/msft-generated-segment"
      - name: Map dimensional XBRL business KPIs offline
        run: >-
          python -m fmva.cli business-kpis
          --instance tests/fixtures/msft_segment_instance_sample.xml
          --mapping config/business_kpi_mapping.msft.yaml
          --output "${{ runner.temp }}/msft-segment-kpis.csv"
          --quality-output "${{ runner.temp }}/msft-segment-quality.json"
      - name: Run business-driver backtest metrics offline
        run: >-
          python -m fmva.cli backtest
          --input tests/fixtures/business_driver_backtest_sample.csv
          --summary-output "${{ runner.temp }}/backtest-summary.csv"
          --errors-output "${{ runner.temp }}/backtest-errors.csv"
      - name: Run MSFT subscriber and ARPU archetype offline
        run: >-
          python -m fmva.run
          --history-json data/sample/msft_fy2021_2025_history.json
          --forecast-assumptions examples/msft/forecast_assumptions.yaml
          --valuation-assumptions examples/msft/valuation_assumptions.yaml
          --business-drivers examples/msft/subscriber_business_drivers.yaml
          --output "${{ runner.temp }}/msft-subscriber"
      - name: Run canonical Excel fallback offline
        run: >-
          python -m fmva.run
          --history-table data/sample/cost_manual_history_input.xlsx
          --forecast-assumptions examples/cost/forecast_assumptions.yaml
          --valuation-assumptions examples/cost/valuation_assumptions.yaml
          --output "${{ runner.temp }}/cost-manual"
      - name: Run COST scenario set offline
        run: >-
          python -m fmva.run
          --history-json data/sample/cost_fy2021_2025_history.json
          --scenario-set examples/cost/scenario_set.yaml
          --output "${{ runner.temp }}/cost-scenarios"
